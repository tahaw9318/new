<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Worker + D1 Database Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-section {
            background: #f7f9fc;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .data-section {
            background: #f7f9fc;
            padding: 30px;
            border-radius: 15px;
        }
        
        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .refresh-btn {
            background: #4CAF50;
        }
        
        .items-list {
            display: grid;
            gap: 15px;
        }
        
        .item-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .item-card:hover {
            transform: translateX(5px);
        }
        
        .item-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .item-description {
            color: #666;
            margin-bottom: 10px;
        }
        
        .item-meta {
            font-size: 12px;
            color: #999;
        }
        
        .delete-btn {
            background: #ff4757;
            padding: 5px 15px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .error {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .success {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Cloudflare D1 Database Demo</h1>
            <p>Full-stack application with Worker + D1 Database</p>
        </div>
        
        <div class="content">
            <div id="message"></div>
            
            <div class="form-section">
                <h2>➕ Add New Item</h2>
                <form id="itemForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required placeholder="Enter item title">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="3" placeholder="Enter item description"></textarea>
                    </div>
                    <button type="submit">Add Item</button>
                </form>
            </div>
            
            <div class="data-section">
                <div class="data-header">
                    <h2>📋 Saved Items</h2>
                    <button class="refresh-btn" onclick="loadItems()">🔄 Refresh</button>
                </div>
                <div id="itemsList">
                    <div class="loading">Loading items...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        // Load items on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadItems();
        });
        
        // Handle form submission
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            
            try {
                const response = await fetch(`${API_BASE}/items`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title, description })
                });
                
                if (response.ok) {
                    showMessage('Item added successfully!', 'success');
                    document.getElementById('itemForm').reset();
                    loadItems();
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Failed to add item', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        });
        
        // Load all items
        async function loadItems() {
            try {
                const response = await fetch(`${API_BASE}/items`);
                
                if (!response.ok) {
                    throw new Error('Failed to load items');
                }
                
                const items = await response.json();
                displayItems(items);
            } catch (error) {
                showMessage('Error loading items: ' + error.message, 'error');
                document.getElementById('itemsList').innerHTML = '<div class="error">Failed to load items. Please try again.</div>';
            }
        }
        
        // Display items
        function displayItems(items) {
            const itemsList = document.getElementById('itemsList');
            
            if (!items || items.length === 0) {
                itemsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">No items found. Add your first item above!</div>';
                return;
            }
            
            itemsList.innerHTML = `
                <div class="items-list">
                    ${items.map(item => `
                        <div class="item-card">
                            <div class="item-title">${escapeHtml(item.title)}</div>
                            <div class="item-description">${escapeHtml(item.description || 'No description')}</div>
                            <div class="item-meta">ID: ${item.id} | Created: ${new Date(item.created_at).toLocaleString()}</div>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // Delete item
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/items/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showMessage('Item deleted successfully!', 'success');
                    loadItems();
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Failed to delete item', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }
        
        // Show message
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="${type}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
